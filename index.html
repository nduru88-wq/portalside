<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demens Hjælpemidler</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2f6fed">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f3f5f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      margin: 10px 0 30px;
      font-size: 34px;
      text-align: center;
      color: #222;
    }

    .grid {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .tile {
      min-height: 210px;
      border-radius: 28px;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: bold;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-align: center;
      padding: 20px;
    }

    .tile:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .radio {
      background: #2f80ed;
    }

    .telefon {
      background: #27ae60;
    }

    .netvaerk {
      background: #f2994a;
    }

    .beskeder {
      background: #9b51e0;
    }

    .disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .small {
      display: block;
      font-size: 18px;
      font-weight: normal;
      margin-top: 10px;
    }

    @media (max-width: 650px) {
      body {
        padding: 18px;
      }

      h1 {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .tile {
        min-height: 150px;
        font-size: 34px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>

  <h1>Demens Hjælpemidler</h1>

  <div class="grid">

    <a class="tile radio" href="https://nduru88-wq.github.io/Morsradio/">
      Radio
    </a>

    <a class="tile telefon" href="https://nduru88-wq.github.io/Showcasetlf-opret/">
      Telefon
    </a>

    <a class="tile netvaerk" href="https://nduru88-wq.github.io/p-r-rende--videohilsen2/">
      Netværk
    </a>

    <a class="tile beskeder disabled" href="#" onclick="alert('Beskeder tilføjes senere'); return false;">
      Beskeder
      <span class="small">Kommer senere</span>
    </a>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>

</body>
</html>
