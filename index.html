<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Demens Hjælpemidler</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2f6fed">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f3f7fb;
      padding: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 8px 0 24px;
      font-size: 34px;
      text-align: center;
      color: #1f2d3d;
    }

    .grid {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    .tile {
      min-height: 220px;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: bold;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      text-align: center;
      padding: 22px;
      user-select: none;
    }

    .tile:active {
      transform: scale(0.97);
    }

    .emoji {
      font-size: 70px;
      margin-bottom: 14px;
      line-height: 1;
    }

    .radio {
      background: #2f80ed;
    }

    .telefon {
      background: #27ae60;
    }

    .netvaerk {
      background: #f2994a;
    }

    .beskeder {
      background: #9b51e0;
    }

    .small {
      display: block;
      font-size: 18px;
      font-weight: normal;
      margin-top: 8px;
    }

    .disabled {
      opacity: 0.72;
    }

    @media (max-width: 650px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .tile {
        min-height: 145px;
        font-size: 34px;
        border-radius: 24px;
      }

      .emoji {
        font-size: 52px;
        margin-bottom: 8px;
      }
    }
  </style>
</head>

<body>

  <h1>Demens Hjælpemidler</h1>

  <div class="grid">

    <a class="tile radio" href="https://nduru88-wq.github.io/Morsradio/">
      <div class="emoji">📻</div>
      Radio
    </a>

    <a class="tile telefon" href="https://nduru88-wq.github.io/Showcasetlf-opret/">
      <div class="emoji">☎️</div>
      Telefon
    </a>

    <a class="tile netvaerk" href="https://nduru88-wq.github.io/p-r-rende--videohilsen2/">
      <div class="emoji">👨‍👩‍👧</div>
      Netværk
    </a>

    <a class="tile beskeder disabled" href="#" onclick="alert('Beskeder tilføjes senere'); return false;">
      <div class="emoji">💬</div>
      Beskeder
      <span class="small">Kommer senere</span>
    </a>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>

</body>
</html>
